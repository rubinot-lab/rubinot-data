services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - flaresolverr
    environment:
      PORT: "8080"
      FLARESOLVERR_URL: "http://flaresolverr:8191/v1"
      RUBINOT_BASE_URL: "https://rubinot.com.br"
      SCRAPE_MAX_TIMEOUT_MS: "120000"
      SCRAPE_MAX_CONCURRENCY: "8"
      APP_VERSION: "v0.2.0"
      APP_COMMIT: "local"
    ports:
      - "${RUBINOT_DATA_PORT:-18080}:8080"
