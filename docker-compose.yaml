services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rubinot-data
    depends_on:
      - flaresolverr
    environment:
      PORT: "8080"
      FLARESOLVERR_URL: "http://flaresolverr:8191/v1"
      RUBINOT_BASE_URL: "https://www.rubinot.com.br"
      SCRAPE_MAX_TIMEOUT_MS: "120000"
      SCRAPE_MAX_CONCURRENCY: "8"
      APP_VERSION: "v0.2.0"
      APP_COMMIT: "local"
    ports:
      - "8080:8080"
