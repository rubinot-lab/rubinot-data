apiVersion: apps/v1
kind: Deployment
metadata:
  name: rubinot-data
  namespace: network
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rubinot-data
  template:
    metadata:
      labels:
        app: rubinot-data
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: cdp-patch
          configMap:
            name: rubinot-data-cdp-patch
      containers:
        - name: api
          image: harbor.cddlabs.casa/giovannirco/rubinot-data:latest
          imagePullPolicy: Always
          env:
            - name: RUBINOT_BASE_URL
              value: https://rubinot.com.br
            - name: FLARESOLVERR_URL
              value: http://localhost:8191/v1
            - name: CDP_URL
              value: ws://localhost:9222
            - name: SCRAPE_MAX_TIMEOUT_MS
              value: "120000"
            - name: SCRAPE_MAX_CONCURRENCY
              value: "8"
            - name: GIN_MODE
              value: release
            - name: APP_VERSION
              value: v0.2.0
            - name: APP_COMMIT
              value: unknown
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          env:
            - name: PROMETHEUS_ENABLED
              value: "false"
            - name: LOG_LEVEL
              value: info
            - name: CDP_BIND_HOST
              value: "0.0.0.0"
            - name: CDP_PORT
              value: "9222"
          ports:
            - containerPort: 8191
            - containerPort: 9222
          volumeMounts:
            - name: cdp-patch
              mountPath: /app/undetected_chromedriver/__init__.py
              subPath: uc_patched_init.py
              readOnly: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: rubinot-data
  namespace: network
spec:
  selector:
    app: rubinot-data
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rubinot-api-route
  namespace: network
spec:
  hostnames:
    - api.rubinot.dev
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: rubinot-data
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rubinot-api-internal-route
  namespace: network
spec:
  hostnames:
    - api.rubinot.dev
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: rubinot-data
          port: 80
