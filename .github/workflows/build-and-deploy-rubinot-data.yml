name: Build and Deploy

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: rubinot-data-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    uses: rubinot-lab/cicd-templates/.github/workflows/build-and-deploy.yml@main
    with:
      image-repo: ghcr.io/rubinot-lab/rubinot-data
      gitops-repo: rubinot-lab/platform-gitops
      gitops-branch: main
      argocd-app: rubinot-lab-rubinot-prod
      gitops-dir: apps/rubinot/manifests/prod
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
