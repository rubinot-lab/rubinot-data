name: Build, Push, and Deploy rubinot-data

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: rubinot-data-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_REPO: ghcr.io/giovannirco/rubinot-data
      GITOPS_REPO: cddlabs-casa/omni-cddlabs-casa
      GITOPS_BRANCH: master
      GITOPS_PATH: manifests/cddlabs/apps/rubinot/rubinot-data.yaml
      GITOPS_CONFIGMAP_PATH: manifests/cddlabs/apps/rubinot/rubinot-data-cdp-patch-configmap.yaml
    steps:
      - name: Checkout rubinot-data
        uses: actions/checkout@v4

      - name: Compute release vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR (PAT)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to GHCR (GITHUB_TOKEN fallback)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.tag_name }}
            ${{ env.IMAGE_REPO }}:latest

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.OMNI_GITOPS_TOKEN }}
          path: gitops
          ref: ${{ env.GITOPS_BRANCH }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate CDP patch ConfigMap
        run: |
          set -euo pipefail
          kubectl create configmap rubinot-data-cdp-patch \
            --namespace=network \
            --from-file=uc_patched_init.py=scripts/uc_patched_init.py \
            --dry-run=client -o yaml > "gitops/${GITOPS_CONFIGMAP_PATH}"

      - name: Update GitOps deployment image and metadata
        env:
          GITOPS_FILE: gitops/${{ env.GITOPS_PATH }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          TAG_NAME: ${{ steps.vars.outputs.tag_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path(os.environ['GITOPS_FILE'])
          text = path.read_text()

          short_sha = os.environ['SHORT_SHA']
          tag_name = os.environ['TAG_NAME']

          text = re.sub(
              r"ghcr\.io/giovannirco/rubinot-data:[^\s\"']+",
              f"ghcr.io/giovannirco/rubinot-data:{short_sha}",
              text,
              count=1,
          )
          text = re.sub(
              r"- name: APP_VERSION\n\s*value: .*",
              f"- name: APP_VERSION\n              value: {tag_name}",
              text,
              count=1,
          )
          text = re.sub(
              r"- name: APP_COMMIT\n\s*value: .*",
              f"- name: APP_COMMIT\n              value: {short_sha}",
              text,
              count=1,
          )

          path.write_text(text)
          PY

      - name: Commit and push GitOps update
        run: |
          set -euo pipefail
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${GITOPS_PATH}" "${GITOPS_CONFIGMAP_PATH}"; then
            echo "No manifest changes; nothing to deploy."
            exit 0
          fi

          git add "${GITOPS_PATH}" "${GITOPS_CONFIGMAP_PATH}"
          git commit -m "chore(rubinot): deploy rubinot-data ${{ steps.vars.outputs.tag_name }} (${{ steps.vars.outputs.short_sha }})"
          git push origin "${GITOPS_BRANCH}"
