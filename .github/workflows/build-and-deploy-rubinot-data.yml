name: Build, Push, and Deploy rubinot-data

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: rubinot-data-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_REPO: ghcr.io/giovannirco/rubinot-data
      GITOPS_REPO: cddlabs-casa/omni-cddlabs-casa
      GITOPS_BRANCH: master
      ARGOCD_APP: rubinot-apps
      GITOPS_PATH: manifests/cddlabs/apps/rubinot/rubinot-data.yaml
      GITOPS_CONFIGMAP_PATH: manifests/cddlabs/apps/rubinot/rubinot-data-cdp-patch-configmap.yaml
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - name: Checkout rubinot-data
        uses: actions/checkout@v4

      - name: Compute release vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          USER="${GHCR_USERNAME:-${GITHUB_ACTOR}}"
          TOKEN="${GHCR_TOKEN:-${FALLBACK_TOKEN}}"
          echo "$TOKEN" | docker login ghcr.io -u "$USER" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE_REPO }}:${{ steps.vars.outputs.tag_name }}
            ${{ env.IMAGE_REPO }}:latest

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.OMNI_GITOPS_TOKEN }}
          path: gitops
          ref: ${{ env.GITOPS_BRANCH }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate CDP patch ConfigMap
        run: |
          set -euo pipefail
          kubectl create configmap rubinot-data-cdp-patch \
            --namespace=network \
            --from-file=uc_patched_init.py=scripts/uc_patched_init.py \
            --dry-run=client -o yaml > "gitops/${GITOPS_CONFIGMAP_PATH}"

      - name: Update GitOps deployment image and metadata
        env:
          GITOPS_FILE: gitops/${{ env.GITOPS_PATH }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          TAG_NAME: ${{ steps.vars.outputs.tag_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path(os.environ['GITOPS_FILE'])
          text = path.read_text()

          short_sha = os.environ['SHORT_SHA']
          tag_name = os.environ['TAG_NAME']

          text = re.sub(
              r"ghcr\.io/giovannirco/rubinot-data:[^\s\"']+",
              f"ghcr.io/giovannirco/rubinot-data:{short_sha}",
              text,
              count=1,
          )
          text = re.sub(
              r"- name: APP_VERSION\n\s*value: .*",
              f"- name: APP_VERSION\n              value: {tag_name}",
              text,
              count=1,
          )
          text = re.sub(
              r"- name: APP_COMMIT\n\s*value: .*",
              f"- name: APP_COMMIT\n              value: {short_sha}",
              text,
              count=1,
          )

          path.write_text(text)
          PY

      - name: Commit and push GitOps update
        id: gitops_commit
        run: |
          set -euo pipefail
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${GITOPS_PATH}" "${GITOPS_CONFIGMAP_PATH}"; then
            echo "No manifest changes; nothing to deploy."
            echo "gitops_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add "${GITOPS_PATH}" "${GITOPS_CONFIGMAP_PATH}"
          git commit -m "chore(rubinot): deploy rubinot-data ${{ steps.vars.outputs.tag_name }} (${{ steps.vars.outputs.short_sha }})"
          git push origin "${GITOPS_BRANCH}"
          echo "gitops_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Wait for ArgoCD app to be Synced and Healthy at target revision
        if: ${{ steps.gitops_commit.outputs.gitops_commit_sha != '' }}
        env:
          TARGET_REVISION: ${{ steps.gitops_commit.outputs.gitops_commit_sha }}
          APP_NAME: ${{ env.ARGOCD_APP }}
          ARGOCD_SERVER: ${{ env.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ env.ARGOCD_AUTH_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_SERVER:-}" ] || [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "Missing required secrets: ARGOCD_SERVER and/or ARGOCD_AUTH_TOKEN" >&2
            exit 1
          fi

          base_url="${ARGOCD_SERVER}"
          case "$base_url" in
            http://*|https://*) ;;
            *) base_url="https://${base_url}" ;;
          esac
          api_url="${base_url}/api/v1/applications/${APP_NAME}"

          deadline=$(( $(date +%s) + 900 ))
          attempt=0

          while true; do
            attempt=$((attempt+1))
            tmp=$(mktemp)
            header_args=(
              -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}"
              -H "Content-Type: application/json"
            )
            if [ -n "${CF_ACCESS_CLIENT_ID:-}" ]; then
              header_args+=( -H "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" )
            fi
            if [ -n "${CF_ACCESS_CLIENT_SECRET:-}" ]; then
              header_args+=( -H "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" )
            fi

            code=$(curl -sS -o "$tmp" -w "%{http_code}" "${header_args[@]}" "$api_url" || true)

            if [ "$code" != "200" ]; then
              echo "[attempt ${attempt}] Argo API HTTP ${code}; response:"
              sed -n '1,20p' "$tmp" || true
            else
              python3 - "$tmp" "$TARGET_REVISION" "$attempt" <<'PY'
              import json,sys
              path,target,attempt=sys.argv[1],sys.argv[2],sys.argv[3]
              obj=json.load(open(path))
              st=obj.get('status',{})
              rev=st.get('sync',{}).get('revision','')
              sync=st.get('sync',{}).get('status','')
              health=st.get('health',{}).get('status','')
              print(f"[attempt {attempt}] revision={rev} sync={sync} health={health} target={target}")
              if rev==target and sync=='Synced' and health=='Healthy':
                  sys.exit(0)
              sys.exit(2)
              PY
              rc=$?
              if [ "$rc" -eq 0 ]; then
                echo "Deployment verified in ArgoCD for app ${APP_NAME} at revision ${TARGET_REVISION}"
                rm -f "$tmp"
                break
              fi
            fi
            rm -f "$tmp"

            if [ $(date +%s) -ge $deadline ]; then
              echo "Timed out waiting for ArgoCD app ${APP_NAME} to reach revision ${TARGET_REVISION} with Synced/Healthy status" >&2
              exit 1
            fi
            sleep 10
          done

